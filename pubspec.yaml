name: flex_yemen
description: Flex Yemen - تطبيق المحفظة الرقمية والتجارة الإلكترونية

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9
  shimmer: ^3.0.0
  cached_network_image: ^3.3.0
  image_picker: ^1.0.7
  file_picker: ^6.1.1

  # State Management
  provider: ^6.1.1
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Navigation
  go_router: ^13.0.1

  # Local Storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  sqflite: ^2.3.0
  path_provider: ^2.1.1

  # Network
  dio: ^5.4.0
  http: ^1.1.2
  connectivity_plus: ^5.0.2

  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0
  firebase_messaging: ^14.7.10
  firebase_storage: ^11.6.0

  # Notifications
  flutter_local_notifications: ^16.3.0

  # Localization
  flutter_localizations:
    sdk: flutter
  intl: ^0.19.0

  # QR Code
  qr_code_scanner: ^1.0.1
  qr_flutter: ^4.1.0
  barcode_widget: ^2.0.4

  # Maps & Location
  google_maps_flutter: ^2.5.0
  geolocator: ^10.1.0
  geocoding: ^2.1.1

  # Payment
  flutter_stripe: ^10.0.0

  # Security
  flutter_secure_storage: ^9.0.0
  local_auth: ^2.1.8
  crypto: ^3.0.3

  # Utils
  uuid: ^4.2.2
  url_launcher: ^6.2.2
  share_plus: ^7.2.1
  package_info_plus: ^5.0.1
  device_info_plus: ^9.1.1
  permission_handler: ^11.1.0

  # Animation
  lottie: ^2.7.0
  flutter_animate: ^4.3.0

  # Charts
  fl_chart: ^0.66.0

  # Date & Time
  jiffy: ^6.2.1
  timeago: ^3.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  hive_generator: ^2.0.1
  json_serializable: ^6.7.1
  freezed: ^2.4.5

flutter:
  uses-material-design: true

  # الأصول
  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/
    - assets/animations/
    - assets/languages/

  # الخطوط
  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Medium.ttf
          weight: 500
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
    - family: Tajawal
      fonts:
        - asset: assets/fonts/Tajawal-Regular.ttf
        - asset: assets/fonts/Tajawal-Medium.ttf
          weight: 500
        - asset: assets/fonts/Tajawal-Bold.ttf
          weight: 700

  # الإعدادات
  plugin:
    platforms:
      android:
        package: com.flexyemen.app
        pluginClass: FlexYemenPlugin
      ios:
        pluginClass: FlexYemenPlugin

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icons/icon.png"
  adaptive_icon_background: "#D4AF37"
  adaptive_icon_foreground: "assets/icons/icon.png"
  min_sdk_android: 21
